<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduSpace — Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .page{display:none}.page.active{display:block;width:100%;max-width:460px;animation:slideUp .35s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .logo{font-family:'Syne',sans-serif;font-size:1.5rem;text-align:center;margin-bottom:20px;letter-spacing:-.03em}.logo span{color:#e85d26}
  .card{background:#fff;border-radius:20px;padding:38px;box-shadow:0 8px 40px rgba(0,0,0,.09)}
  .card h2{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:4px}
  .card>p{color:#999;font-size:.88rem;margin-bottom:28px}
  .gbtn{width:100%;padding:11px;border:1.5px solid #e5e5e5;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:border-color .2s;margin-bottom:20px}
  .gbtn:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .divider{display:flex;align-items:center;gap:12px;color:#ccc;font-size:.8rem;margin-bottom:20px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}
  .fg{margin-bottom:16px;position:relative}
  .fg label{display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:6px;transition:color .2s}
  .fg:focus-within label{color:#e85d26}
  .fg input,.fg select{width:100%;padding:11px 14px;border:1.5px solid #e8e8e8;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.93rem;color:#0d0d0d;outline:none;transition:border-color .2s,box-shadow .2s;background:#fff}
  .fg input:focus,.fg select:focus{border-color:#e85d26;box-shadow:0 0 0 3px rgba(232,93,38,.08)}
  .fg.valid input,.fg.valid .tick{border-color:#22c55e;opacity:1;color:#22c55e}
  .fg.invalid input,.fg.invalid .tick{border-color:#ef4444;opacity:1;color:#ef4444}
  .tick{position:absolute;right:12px;top:38px;font-size:.85rem;opacity:0;transition:opacity .2s}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .err{display:none;color:#ef4444;font-size:.75rem;margin-top:5px}
  .pw-wrap{position:relative}.pw-wrap input{padding-right:42px}
  .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#bbb;font-size:.95rem;user-select:none}
  .eye:hover{color:#555}
  .strength{height:3px;border-radius:99px;background:#eee;margin-top:6px;overflow:hidden}
  .strength-fill{height:100%;width:0;transition:all .3s}
  .forgot{text-align:right;margin:-8px 0 16px}.forgot a{font-size:.8rem;color:#e85d26;text-decoration:none;font-weight:600}
  .forgot a:hover{text-decoration:underline}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .2s}
  .btn:active{transform:scale(.98)}.dark{background:#0d0d0d;color:#fff}.orange{background:#e85d26;color:#fff}
  .steps{display:flex;justify-content:center;gap:6px;margin-bottom:24px}
  .step{width:8px;height:8px;border-radius:50%;background:#e8e8e8;transition:all .3s}.step.on{background:#e85d26;width:22px;border-radius:99px}
  .switch{text-align:center;font-size:.85rem;color:#aaa;margin-top:20px}.switch a{color:#e85d26;font-weight:600;cursor:pointer}
  .toast{position:fixed;bottom:24px;right:24px;background:#0d0d0d;color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:99}
  .toast.show{opacity:1;transform:none}
</style>
</head>
<body>
<div class="page active" id="page-login">
  <div class="logo">Edu<span>Space</span></div>
  <div class="card">
    <h2>Welcome back 👋</h2>
    <p>Sign in to continue your learning journey</p>
    <button class="gbtn" onclick="notify('Google sign-in coming soon!')"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google</button>
    <div class="divider">or sign in with email</div>
    <div class="fg" id="l-email-fg"><label>Email</label><input id="l-email" type="email" placeholder="you@example.com" oninput="liveValidate('l-email','l-email-fg','email')"><span class="tick">✓</span></div>
    <div class="fg"><label>Password</label><div class="pw-wrap"><input id="l-pass" type="password" placeholder="••••••••"><span class="eye" onclick="togglePw('l-pass',this)">👁</span></div></div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button class="btn dark" onclick="handleLogin()">Sign in →</button>
    <p class="switch">No account? <a onclick="go('page-signup')">Sign up free</a></p>
  </div>
</div>
<div class="page" id="page-signup">
  <div class="logo">Edu<span>Space</span></div>
  <div class="card">
    <h2>Create account ✨</h2>
    <p>Free to start — no card needed</p>
    <div class="steps"><div class="step on" id="dot-1"></div><div class="step" id="dot-2"></div><div class="step" id="dot-3"></div></div>
    <button class="gbtn" onclick="notify('Google sign-up coming soon!')"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign up with Google</button>
    <div class="divider">or create with email</div>
    <div class="row">
      <div class="fg" id="s-first-fg"><label>First name</label><input id="s-first" placeholder="Alex" oninput="liveValidate('s-first','s-first-fg','text')"><span class="tick">✓</span><div class="err" id="e-first"></div></div>
      <div class="fg" id="s-last-fg"><label>Last name</label><input id="s-last" placeholder="Morgan" oninput="liveValidate('s-last','s-last-fg','text')"><span class="tick">✓</span><div class="err" id="e-last"></div></div>
    </div>
    <div class="fg" id="s-email-fg"><label>Email</label><input id="s-email" type="email" placeholder="you@example.com" oninput="liveValidate('s-email','s-email-fg','email')"><span class="tick">✓</span><div class="err" id="e-email"></div></div>
    <div class="fg"><label>I am a…</label><select onchange="updateDots(2)"><option>Student</option><option>Educator</option><option>Professional</option></select></div>
    <div class="fg" id="s-pass-fg"><label>Password</label><div class="pw-wrap"><input id="s-pass" type="password" placeholder="Min. 8 characters" oninput="checkStrength(this);liveValidate('s-pass','s-pass-fg','pass')"><span class="eye" onclick="togglePw('s-pass',this)">👁</span></div><div class="strength"><div class="strength-fill" id="s-bar"></div></div><div class="err" id="e-pass"></div></div>
    <button class="btn orange" onclick="signup()">Create free account →</button>
    <p class="switch">Have an account? <a onclick="go('page-login')">Sign in</a></p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const $=id=>document.getElementById(id);
  const go=id=>{document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$(id).classList.add('active')};
  const notify=msg=>{const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)};
  const setErr=(id,msg)=>{$(id).textContent=msg;$(id).style.display='block'};

  function togglePw(id,eye){const i=$(id);i.type=i.type==='password'?'text':'password';eye.textContent=i.type==='password'?'👁':'🙈'}

  function liveValidate(id,fgId,type){
    const val=$(id).value.trim(),fg=$(fgId);
    const ok=type==='email'?/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val):type==='pass'?val.length>=8:val.length>0;
    const hasVal=type==='pass'?$(id).value.length>0:val!=='';
    fg.classList.toggle('valid',ok&&hasVal);
    fg.classList.toggle('invalid',!ok&&hasVal);
  }

  function checkStrength(input){
    const v=input.value,bar=$('s-bar');
    let s=[v.length>=8,v.length>=12,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
    bar.style.width=(s/5*100)+'%';
    bar.style.background=['#ef4444','#f97316','#eab308','#22c55e','#16a34a'][s-1]||'#eee';
    if(s>=2)updateDots(3);
  }

  function updateDots(n){[1,2,3].forEach(i=>{const d=$('dot-'+i);if(d)d.classList.toggle('on',i<=n)})}

  function handleLogin(){
    const e=$('l-email').value.trim(),p=$('l-pass').value;
    if(!e||!p)return notify('⚠️ Please fill in all fields');
    notify('Signing you in… ✓');setTimeout(()=>go('page-signup'),900);
  }

  function signup(){
    document.querySelectorAll('.err').forEach(e=>{e.textContent='';e.style.display='none'});
    const first=$('s-first').value.trim(),last=$('s-last').value.trim(),email=$('s-email').value.trim(),pass=$('s-pass').value;
    let ok=true;
    if(!first){setErr('e-first','Required');ok=false}
    if(!last){setErr('e-last','Required');ok=false}
    if(!email){setErr('e-email','Required');ok=false}
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setErr('e-email','Invalid email');ok=false}
    if(!pass){setErr('e-pass','Required');ok=false}
    else if(pass.length<8){setErr('e-pass','Min. 8 characters');ok=false}
    if(ok){updateDots(3);notify('Account created! Welcome 🎉')}
  }
</script>
</body>
</html>
